# CI gate for the claims-review agent. Drop this in .github/workflows/.
#
# The deterministic trust checks and the judge run via the eval suite. The gate
# compares the current code against the committed ci-baseline.json (the last
# green baseline, version-controlled and updated as a reviewable diff) and blocks
# if the published-falsehood rate rises, if any trust check fails, or if a
# previously-passing claim regresses. This mirrors the repo's own
# .github/workflows/ci.yml.
name: claims-review-gate

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"

      # Layer 1+2 unit tests (the trust checks, the gate logic, the judge).
      - name: tests
        run: pytest -q

      # The gate. Compares the PR against the committed green baseline and exits
      # non-zero to block. Update the baseline deliberately with
      # `claimcheck baseline --out ci-baseline.json` (a reviewable diff).
      - name: gate
        run: claimcheck gate --baseline ci-baseline.json --report gate.md

      - name: upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report
          path: gate.md

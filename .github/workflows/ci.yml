name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"

      - name: unit tests
        run: pytest -q

      - name: eval suite runs clean
        run: claimcheck run

      - name: the gate catches a buggy reviewer
        run: |
          claimcheck baseline --out /tmp/baseline.json
          if claimcheck gate --data data/golden_buggy --baseline /tmp/baseline.json; then
            echo "ERROR: the gate should have blocked the buggy reviewer" && exit 1
          else
            echo "OK: the gate correctly blocked the buggy reviewer"
          fi
